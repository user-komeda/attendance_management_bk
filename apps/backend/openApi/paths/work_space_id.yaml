get:
  tags: [ workspace ]
  summary: ワークスペース詳細の取得
  operationId: getWorkSpace
  parameters:
    - $ref: '../components/parameters/WorkSpaceId.yaml'
  responses:
    "200":
      description: 正常にワークスペース情報を返却します
      content:
        application/json:
          schema:
            $ref: '../components/schemas/WorkSpaceWithMemberShips.yaml'
    "404":
      description: ワークスペースが見つかりません
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
    default:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'

patch:
  tags: [ workspace ]
  summary: ワークスペースの更新
  operationId: updateWorkSpace
  parameters:
    - $ref: '../components/parameters/WorkSpaceId.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/UpdateWorkSpaceRequest.yaml'
  responses:
    "204":
      description: ワークスペースが正常に更新されました（レスポンスボディなし）
    "400":
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
    "404":
      description: ワークスペースが見つかりません
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
    default:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'

delete:
  tags: [ workspace ]
  summary: ワークスペースの削除
  operationId: deleteWorkSpace
  parameters:
    - $ref: '../components/parameters/WorkSpaceId.yaml'
  responses:
    "204":
      description: ワークスペースが正常に削除されました
    "404":
      description: ワークスペースが見つかりません
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
    default:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
