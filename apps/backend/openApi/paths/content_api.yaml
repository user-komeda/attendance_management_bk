post:
  tags: [ content_api ]
  summary: コンテンツAPIの作成
  security:
    - bearerAuth: [ ]
  operationId: createContentApi
  parameters:
    - $ref: '../components/parameters/WorkSpaceSlug.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/CreateContentApiWithFieldsRequest.yaml'
  responses:
    "201":
      description: コンテンツAPIが正常に作成されました
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ContentApiWithFields.yaml'
    "400":
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
    default:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
