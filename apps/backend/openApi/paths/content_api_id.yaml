get:
  tags: [ content_api ]
  summary: コンテンツAPI詳細の取得
  security:
    - bearerAuth: [ ]
  operationId: getContentApi
  parameters:
    - $ref: '../components/parameters/WorkSpaceSlug.yaml'
    - $ref: '../components/parameters/ContentApiId.yaml'
  responses:
    "200":
      description: 正常にコンテンツAPI情報を返却します
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ContentApiWithFields.yaml'
    "404":
      description: コンテンツAPIが見つかりません
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
    default:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'

patch:
  tags: [ content_api ]
  summary: コンテンツAPIの更新
  security:
    - bearerAuth: [ ]
  operationId: updateContentApi
  parameters:
    - $ref: '../components/parameters/WorkSpaceSlug.yaml'
    - $ref: '../components/parameters/ContentApiId.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/UpdateContentApiWithFieldsRequest.yaml'
  responses:
    "204":
      description: コンテンツAPIが正常に更新されました
    "400":
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
    "404":
      description: コンテンツAPIが見つかりません
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
    default:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'

delete:
  tags: [ content_api ]
  summary: コンテンツAPIの削除
  security:
    - bearerAuth: [ ]
  operationId: deleteContentApi
  parameters:
    - $ref: '../components/parameters/WorkSpaceSlug.yaml'
    - $ref: '../components/parameters/ContentApiId.yaml'
  responses:
    "204":
      description: コンテンツAPIが正常に削除されました
    "404":
      description: コンテンツAPIが見つかりません
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
    default:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
