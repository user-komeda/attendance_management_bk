post:
  tags: [ auth ]
  summary: サインアップ（ユーザー登録）
  security: [ ]
  description: |-
    新規ユーザーを登録します。POST + JSON で受け付けます。
  operationId: signup
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/SignupRequest.yaml'
  responses:
    "201":
      description: 登録が成功しました
      content:
        application/json:
          schema:
            $ref: '../components/schemas/SignupResponse.yaml'
          examples:
            success:
              value:
                user_id: "00000000-0000-0000-0000-000000000000"
    "400":
      description: リクエスト内容が不正です
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
    "409":
      description: メールアドレスが既に登録されています
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
    default:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
