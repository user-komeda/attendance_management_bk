type: object
description: エラー情報
properties:
  error_code:
    type: string
    description: エラー種別コード
    example: BAD_REQUEST
  message:
    type: string
    description: エラーメッセージ
    example: invalid request body
  field_errors:
    type: array
    description: フィールド単位のエラー情報
    items:
      type: object
      required: [ key, message ]
      properties:
        key:
          type: string
        message:
          type: string
required: [ error_code, message ]
