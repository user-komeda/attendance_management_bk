type: object
description: メンバーシップ情報を含むワークスペース詳細レスポンス
properties:
  id:
    type: string
    format: uuid
    example: 4b0a3b44-2b8f-4a7c-9f08-6b7e1b2c3d4e
  work_spaces:
    $ref: './WorkSpace.yaml'
  member_ships:
    $ref: './MemberShips.yaml'
  content_api_names:
    type: array
    items:
      type: string
    description: ワークスペース内のコンテンツAPIの名前リスト
    example: [ 'articles', 'products' ]
required: [ id, work_spaces, member_ships, content_api_names ]
