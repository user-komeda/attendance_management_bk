type: object
description: メンバーシップ情報を含むワークスペース詳細レスポンス
properties:
  id:
    type: string
    format: uuid
    example: 4b0a3b44-2b8f-4a7c-9f08-6b7e1b2c3d4e
  work_spaces:
    $ref: './WorkSpace.yaml'
  member_ships:
    type: array
    items:
      $ref: './MemberShips.yaml'
  content_api_names:
    type: array
    items:
      type: string
    description: ワークスペース内のコンテンツAPIの名前リスト
    example: [ 'articles', 'products' ]
  content_apis:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        api_type:
          type: string
          enum: [ list, object ]
      required: [ name, api_type ]
    description: ワークスペース内のコンテンツAPI情報
    example:
      - name: articles
        api_type: list
required: [ id, work_spaces, member_ships, content_api_names, content_apis ]
