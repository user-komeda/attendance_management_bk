type: object
description: コンテンツAPI作成リクエスト
properties:
  name:
    type: string
    description: コンテンツAPIの名前
    example: articles
  endpoint:
    type: string
    description: エンドポイント名
    example: articles
  api_type:
    type: string
    description: APIタイプ
    example: collection
  fields:
    type: array
    items:
      type: object
      properties:
        field_id:
          type: string
        display_name:
          type: string
        field_type:
          type: string
        required:
          type: boolean
        unique_value:
          type: boolean
        order_index:
          type: integer
        is_active:
          type: boolean
        settings:
          type: object
          additionalProperties: true
      required: [ field_id, display_name, field_type ]
required: [ name, endpoint, api_type, fields ]
